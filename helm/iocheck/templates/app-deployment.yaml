apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iocheck.fullname" . }}
  labels:
    {{- include "iocheck.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "iocheck.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "iocheck.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: iocheck
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: IOCHECK_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "iocheck.fullname" . }}-app
                  key: IOCHECK_DATABASE_URL
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
