{{- if .Values.grafana.enabled }}
{{- /*
  Convert the app's CPU request (e.g. "100m", "0.5", "1") into a plain "cores"
  number so the dashboard can compute CPU as a percentage of requests. This
  keeps the Grafana panels in sync with whatever the user sets in values.yaml,
  so the dashboard ships correctly to any machine without manual setup.
*/}}
{{- $cpuReq := toString .Values.resources.requests.cpu -}}
{{- $cpuCores := 0.1 -}}
{{- if hasSuffix "m" $cpuReq -}}
{{- $cpuCores = divf (float64 (trimSuffix "m" $cpuReq)) 1000.0 -}}
{{- else -}}
{{- $cpuCores = float64 $cpuReq -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iocheck.grafanaName" . }}
  labels:
    {{- include "iocheck.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "iocheck.prometheusName" . }}:{{ .Values.prometheus.service.port }}
        isDefault: true
        editable: true

  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: iocheck
        orgId: 1
        folder: iocheck
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards

  iocheck-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "expr": "sum by (route) (rate(iocheck_http_requests_total[1m]))",
              "legendFormat": "{{`{{ route }}`}}",
              "refId": "A"
            }
          ],
          "title": "Request Rate by Route",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "expr": "histogram_quantile(0.95, sum by (le) (rate(iocheck_http_request_duration_seconds_bucket{route=\"/lookup\"}[5m])))",
              "legendFormat": "p95 /lookup",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "expr": "histogram_quantile(0.99, sum by (le) (rate(iocheck_http_request_duration_seconds_bucket{route=\"/lookup\"}[5m])))",
              "legendFormat": "p99 /lookup",
              "refId": "B"
            }
          ],
          "title": "/lookup Latency (p95 / p99)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 5
                  },
                  {
                    "color": "red",
                    "value": 20
                  }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "expr": "sum by (pod) (iocheck_http_in_flight_requests{route=\"/lookup\"}) and on(pod) (up{job=\"iocheck\"} == 1)",
              "instant": true,
              "legendFormat": "{{`{{ pod }}`}}",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "In-Flight Requests by Pod",
          "type": "gauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 6,
            "y": 8
          },
          "id": 4,
          "options": {
            "displayLabels": [
              "name",
              "value"
            ],
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "pieType": "donut",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "expr": "sum by (verdict) (iocheck_lookup_total)",
              "legendFormat": "{{`{{ verdict }}`}}",
              "refId": "A"
            }
          ],
          "title": "Lookup Verdicts",
          "type": "piechart"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "percent",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 12,
            "y": 8
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "expr": "sum(rate(process_cpu_seconds_total{job=\"iocheck\"}[2m])) / (count(up{job=\"iocheck\"} == 1) * {{ $cpuCores }}) * 100",
              "legendFormat": "cpu % of requests",
              "refId": "A"
            }
          ],
          "title": "App CPU (% of requests)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 18,
            "y": 8
          },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "expr": "process_resident_memory_bytes{job=\"iocheck\"}",
              "legendFormat": "{{`{{ pod }}`}} rss",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "expr": "nodejs_heap_size_used_bytes{job=\"iocheck\"}",
              "legendFormat": "{{`{{ pod }}`}} heap used",
              "refId": "B"
            }
          ],
          "title": "App Memory",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 16
          },
          "id": 7,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "expr": "count(up{job=\"iocheck\"} == 1)",
              "legendFormat": "running pods",
              "refId": "A"
            }
          ],
          "title": "Running iocheck Pods",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "continuous-GrYlRd"
              },
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 50
                  },
                  {
                    "color": "red",
                    "value": 70
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 18,
            "x": 6,
            "y": 16
          },
          "id": 8,
          "options": {
            "globalShape": "hexagon_pointed_top",
            "globalDisplayMode": "all",
            "globalUnitFormat": "percent",
            "globalDecimals": 1,
            "globalAutoScaleFonts": true,
            "globalAutoScalePolygonText": true,
            "globalAutoScalePolygonFontSize": true,
            "globalShowValueEnabled": true,
            "globalShowTimestampEnabled": false,
            "globalTextFontSize": 12,
            "globalOperatorName": "current",
            "ellipseEnabled": false,
            "globalThresholds": [
              { "color": "green", "value": null, "state": 0 },
              { "color": "yellow", "value": 50, "state": 1 },
              { "color": "red", "value": 70, "state": 2 }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "expr": "(sum by (pod) (rate(process_cpu_seconds_total{job=\"iocheck\"}[2m])) / {{ $cpuCores }} * 100 or on(pod) (sum by (pod) (up{job=\"iocheck\"}) * 0)) and on(pod) (up{job=\"iocheck\"} == 1)",
              "instant": true,
              "legendFormat": "{{`{{ pod }}`}}",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "CPU by Pod (% of requests)",
          "type": "grafana-polystat-panel"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 39,
      "tags": [
        "iocheck",
        "prometheus"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "iocheck API",
      "uid": "iocheck-api",
      "version": 1,
      "weekStart": ""
    }
{{- end }}
