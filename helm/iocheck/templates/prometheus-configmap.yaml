{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iocheck.prometheusName" . }}
  labels:
    {{- include "iocheck.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: iocheck
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - action: keep
            source_labels:
              - __meta_kubernetes_pod_label_app_kubernetes_io_name
              - __meta_kubernetes_pod_label_app_kubernetes_io_instance
              - __meta_kubernetes_pod_label_app_kubernetes_io_component
            regex: {{ printf "%s;%s;app" (include "iocheck.name" .) .Release.Name | quote }}
          - action: keep
            source_labels:
              - __meta_kubernetes_pod_container_port_name
            regex: http
          - source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod
          - source_labels:
              - __meta_kubernetes_pod_ip
            target_label: pod_ip
          - source_labels:
              - __meta_kubernetes_pod_container_name
            target_label: container

      # cAdvisor on each kubelet — this is the data source that metrics-server
      # turns into the CPU number the HPA evaluates. Scraping it directly lets
      # the dashboard show "what the HPA actually sees" for Challenge 1.
      - job_name: kubelet-cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
        metric_relabel_configs:
          # Keep only iocheck-namespace container metrics + drop empty container
          # series. This keeps Prometheus storage small on the demo cluster.
          - source_labels: [namespace]
            regex: {{ .Release.Namespace }}
            action: keep
          - source_labels: [container]
            regex: ""
            action: drop

      # kube-state-metrics exposes HPA decision state (current vs target,
      # current vs desired replicas). Required for Challenge 1 evidence:
      # the panel "HPA computed average vs target" reads from here.
      - job_name: kube-state-metrics
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels:
              - __meta_kubernetes_service_label_app_kubernetes_io_name
            action: keep
            regex: kube-state-metrics
          - source_labels:
              - __meta_kubernetes_endpoint_port_name
            action: keep
            regex: http
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_service_name]
            target_label: service
{{- end }}
