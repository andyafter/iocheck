{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iocheck.prometheusName" . }}
  labels:
    {{- include "iocheck.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: iocheck
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - action: keep
            source_labels:
              - __meta_kubernetes_pod_label_app_kubernetes_io_name
              - __meta_kubernetes_pod_label_app_kubernetes_io_instance
              - __meta_kubernetes_pod_label_app_kubernetes_io_component
            regex: {{ printf "%s;%s;app" (include "iocheck.name" .) .Release.Name | quote }}
          - action: keep
            source_labels:
              - __meta_kubernetes_pod_container_port_name
            regex: http
          - source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod
          - source_labels:
              - __meta_kubernetes_pod_ip
            target_label: pod_ip
          - source_labels:
              - __meta_kubernetes_pod_container_name
            target_label: container
{{- end }}
