replicaCount: 2

image:
  repository: iocheck
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 3000
  nodePort: 30080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podDisruptionBudget:
  enabled: true
  minAvailable: 2

postgres:
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  auth:
    user: iocheck
    password: iocheck
    database: iocheck
  initSql: ""
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

iocCache:
  ttlSeconds: 600
  negativeTtlSeconds: 60

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: v2.55.1
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 9090
    nodePort: 30090
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: 11.4.0
    pullPolicy: IfNotPresent
  admin:
    user: admin
    password: admin
  service:
    type: NodePort
    port: 3000
    nodePort: 30091
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
